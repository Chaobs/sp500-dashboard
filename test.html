<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据源测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a1a;
            color: #e0e0e0;
        }
        .card {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px solid #3a3a3a;
        }
        .success { color: #00d4aa; }
        .error { color: #ff6b6b; }
        .data { 
            background: #1a1a1a; 
            padding: 15px; 
            border-radius: 4px; 
            margin-top: 10px;
            font-family: 'Courier New', monospace;
        }
        button {
            background: #4dabf7;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #3d9be7; }
    </style>
</head>
<body>
    <h1>S&P 500 数据源测试</h1>
    
    <div class="card">
        <h2>测试东方财富API</h2>
        <button onclick="testAPI()">测试数据获取</button>
        <div id="result" class="data">点击按钮测试...</div>
    </div>
    
    <div class="card">
        <h2>当前数据</h2>
        <div id="priceData" class="data">等待测试...</div>
    </div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            const priceDiv = document.getElementById('priceData');
            
            resultDiv.innerHTML = '正在获取数据...';
            
            try {
                const url = 'http://push2.eastmoney.com/api/qt/stock/get?secid=100.SPX&fields=f43,f44,f45,f46,f47,f48,f50,f51,f52,f55,f57,f58,f60,f170';
                
                const response = await fetch(url, {
                    method: 'GET',
                    mode: 'cors'
                });
                
                const result = await response.json();
                
                if (result && result.data) {
                    const data = result.data;
                    
                    resultDiv.innerHTML = `<span class="success">✓ API连接成功!</span>`;
                    
                    const price = data.f43 / 100;
                    const change = data.f51 / 100;
                    const changePercent = data.f170 / 100;
                    const open = data.f44 / 100;
                    const high = data.f45 / 100;
                    const low = data.f46 / 100;
                    const prevClose = data.f60 / 100;
                    const volume = data.f47;
                    
                    priceDiv.innerHTML = `
                        <strong>标普500 (${data.f57})</strong><br>
                        名称: ${data.f58}<br>
                        当前价格: <span class="success">${price.toFixed(2)}</span><br>
                        涨跌额: ${change >= 0 ? '+' : ''}${change.toFixed(2)}<br>
                        涨跌幅: <span class="${changePercent >= 0 ? 'success' : 'error'}">${changePercent >= 0 ? '+' : ''}${changePercent.toFixed(2)}%</span><br>
                        <br>
                        开盘: ${open.toFixed(2)}<br>
                        最高: ${high.toFixed(2)}<br>
                        最低: ${low.toFixed(2)}<br>
                        昨收: ${prevClose.toFixed(2)}<br>
                        成交量: ${(volume / 1000000000).toFixed(2)}B<br>
                        <br>
                        <small>数据来源: 东方财富 | 更新时间: ${new Date().toLocaleString('zh-CN')}</small>
                    `;
                } else {
                    resultDiv.innerHTML = `<span class="error">✗ API返回数据为空</span>`;
                    priceDiv.innerHTML = '无数据';
                }
            } catch (error) {
                resultDiv.innerHTML = `<span class="error">✗ 错误: ${error.message}</span>`;
                priceDiv.innerHTML = '获取失败';
                console.error('详细错误:', error);
            }
        }
        
        // 页面加载时自动测试
        setTimeout(testAPI, 500);
    </script>
</body>
</html>
